# Curated handwritten Makefile.am rules that map cleanly onto AwkTestSupport.
# These cases complement Maketests without attempting to model arbitrary make recipes.

cases = argcasfile, beginfile1, eofsrc1, longwrds, nsawk1a, nsawk1b, nsawk1c, nsawk2a, nsawk2b, nsidentifier, readfile2, spacere, symtab6, symtab9

argcasfile.scripts = argcasfile.awk
argcasfile.operands = ARGC=1| /no/such/file
argcasfile.stdin = argcasfile.in
argcasfile.expected = argcasfile.ok

beginfile1.scripts = beginfile1.awk
beginfile1.operands = @path:beginfile1.awk|@path:.|@path:./no/such/file|@path:Makefile
beginfile1.expected = beginfile1.ok

eofsrc1.scripts = eofsrc1a.awk|eofsrc1b.awk
eofsrc1.expected = eofsrc1.ok

longwrds.arguments = -v|SORT=sort
longwrds.scripts = longwrds.awk
longwrds.stdin = longwrds.in
longwrds.expected = longwrds.ok

nsawk1a.scripts = nsawk1.awk
nsawk1a.expected = nsawk1a.ok

nsawk1b.arguments = -v|I=fine
nsawk1b.scripts = nsawk1.awk
nsawk1b.expected = nsawk1b.ok

nsawk1c.arguments = -v|awk::I=fine
nsawk1c.scripts = nsawk1.awk
nsawk1c.expected = nsawk1c.ok

nsawk2a.arguments = -v|I=fine
nsawk2a.scripts = nsawk2.awk
nsawk2a.expected = nsawk2a.ok

nsawk2b.arguments = -v|awk::I=fine
nsawk2b.scripts = nsawk2.awk
nsawk2b.expected = nsawk2b.ok

nsidentifier.arguments = -v|SORT=sort
nsidentifier.scripts = nsidentifier.awk
nsidentifier.expected = nsidentifier.ok

readfile2.scripts = readfile2.awk
readfile2.operands = @path:readfile2.awk|@path:readdir.awk
readfile2.expected = readfile2.ok

spacere.scripts = spacere.awk
spacere.expected = spacere.ok

symtab6.scripts = symtab6.awk
symtab6.expected = symtab6.ok

symtab9.scripts = symtab9.awk
symtab9.expected = symtab9.ok
