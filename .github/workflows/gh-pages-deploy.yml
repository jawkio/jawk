name: Deploy Pages (from existing run artifact)

on:
  workflow_dispatch:
    inputs:
      artifact_url:
        description: "URL of the artifact to deploy"
        default: "https://github.com/jawkio/jawk/actions/runs/24512161853/artifacts/6474102112"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read # Needed to download artifacts from other runs
    environment:
      name: github-pages

    steps:
      - name: Extract run_id from URL
        id: extract
        run: |
          URL="${{ inputs.artifact_url }}"
          # Extract the run_id (the number right after /runs/)
          RUN_ID=$(echo "$URL" | sed -nE 's|.*/runs/([0-9]+).*|\1|p')
          echo "Extracted run_id: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      # Download the artifact from the *previous* workflow run
      - name: Download Pages artifact from run
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          run-id: ${{ steps.extract.outputs.run_id }}
          path: _site # Download into a specific folder
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Upload the artifact to the *current* workflow run so deploy-pages can find it
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3 # Use v3 to match current standard versions
        with:
          path: _site

      # Deploy it
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
